# 新闻源配置文件
# 每个源需指定: name, url, language("zh"/"en")
# type: rss | api | web
# enabled: true/false 可临时关闭某个源

sources:
  # ========== 国际源 ==========
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    type: rss
    language: en
    enabled: true

  - name: "The Verge"
    url: "https://www.theverge.com/rss/index.xml"
    type: rss
    language: en
    enabled: true

  - name: "VentureBeat AI"
    url: "https://venturebeat.com/category/ai/feed/"
    type: rss
    language: en
    enabled: true

  - name: "Ars Technica"
    url: "https://feeds.arstechnica.com/arstechnica/index"
    type: rss
    language: en
    enabled: true

  - name: "MIT Technology Review AI"
    url: "https://www.technologyreview.com/feed/"
    type: rss
    language: en
    enabled: true

  # ========== 国内源 ==========
  - name: "IT之家 AI"
    url: "https://www.ithome.com/rss/"
    type: rss
    language: zh
    enabled: true

  - name: "少数派"
    url: "https://sspai.com/feed"
    type: rss
    language: zh
    enabled: true
